app = "eqm-utility"
primary_region = "iad"

[build]

[env]
  EQM_DATA_DIR = "/data"
  EQM_GIT_PUSH_ENABLED = "true"

[mounts]
  source = "eqm_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
